<!DOCTYPE html>
<html>
<head>
    <title>Study Hours Predictor</title>
</head>
<body>
    <h1>Study Hours → Exam Score Predictor</h1>
    <form id="predictForm">
        <label>Study Hours:</label>
        <input type="number" id="hours" required>
        <button type="submit">Predict</button>
    </form>
    <h2 id="result"></h2>

    <script>
        const form = document.getElementById("predictForm");
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const hours = document.getElementById("hours").value;
            const response = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ Study_Hours: hours })
            });
            const data = await response.json();
            document.getElementById("result").innerText = 
                data.Predicted_Score ? `Predicted Score: ${data.Predicted_Score}` : data.error;
        });
    </script>
</body>
</html>
